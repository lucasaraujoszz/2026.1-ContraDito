name: Testes Python Backend

on:
  pull_request:
    branches:
      - main 

jobs:
  rodar-testes:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências da API e do Worker
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx # httpx é necessário para testar FastAPI
          # Instala os dois arquivos que achamos nas imagens!
          pip install -r requirements.api.txt
          pip install -r requirements.worker.txt

      - name: Executar testes com Pytest
        run: pytest