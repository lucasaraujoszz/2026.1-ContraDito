name: Testes Python Backend

on:
  pull_request:
    branches:
      - develop
      - main 

jobs:
  rodar-testes:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências da API, Worker e Testes
        run: |
          python -m pip install --upgrade pip
          # 1. Instala a API e dependências de teste (com httpx==0.27.2)
          pip install -r requirements.api.txt -r requirements.test.txt
          
          # 2. Instala o worker filtrando o google-genai para evitar o conflito no resolver
          grep -v "google-genai" requirements.worker.txt > temp_requirements.txt
          pip install -r temp_requirements.txt
          rm temp_requirements.txt
          
          # 3. Instala a versão específica do google-genai
          pip install "google-genai==2.8.0"

      - name: Executar testes com Pytest
        run: pytest