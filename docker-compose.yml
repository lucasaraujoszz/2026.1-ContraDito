services:
  redis:
    image: redis:alpine
    platform: linux/arm64
    networks:
      - read
      - write
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - read
    volumes:
      - .:/app
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Hot-reload ativado para ambiente de desenvolvimento local
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - read
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8001}
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://fastapi:8000}
    depends_on:
      fastapi:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    platform: linux/arm64
    networks:
      - write
    volumes:
      - .:/app
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    # Mantém o contêiner em modo ocioso para permitir a execução manual via `docker compose run` 
    # ou cron jobs internos, sem fechar imediatamente o contêiner no compose up.
    command: ["tail", "-f", "/dev/null"]

networks:
  read:
  write:

volumes:
  huggingface_cache: