services:
  redis:
    image: redis:alpine
    networks:
      - read
      - write
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - read
    volumes:
      - .:/app
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Hot-reload ativado para ambiente de desenvolvimento local
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - read
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8001}
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://fastapi:8000}
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      fastapi:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    networks:
      - write
    volumes:
      - .:/app
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    # Mantém o contêiner em modo ocioso para permitir a execução manual via `docker compose run` 
    # ou cron jobs internos, sem fechar imediatamente o contêiner no compose up.
    command: ["tail", "-f", "/dev/null"]

  # =================================================================
  # Serviços de Teste (executados apenas com --profile test)
  # =================================================================
  test-api:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile.api
      target: test
    networks:
      - read
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy

  test-worker:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: test
    networks:
      - write
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}

  docs:
    image: squidfunk/mkdocs-material:9.5.18
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ./docs:/docs
    environment:
      - MKDOCS_WATCHDOG_USE_POLLING=true

networks:
  read:
  write:

volumes:
  huggingface_cache: